name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  reproducible-synthetic-lab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python requirements
        run: |
          pip install -r requirements.txt
          pip install -r requirements-research.txt

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust build and tests
        run: cargo test --all-targets --all-features

      - name: Python checks
        run: |
          python -m py_compile pipeline/2_latency.py pipeline/3_snapshot.py pipeline/4_backtest.py pipeline/5_gridsearch.py pipeline/snapshot_manifest.py pipeline/snapshot_validator.py ob_backtest.py
          python -m unittest discover -s tests -p 'test_*.py'

      - name: Offline synthetic smoke test
        run: python pipeline/4_backtest.py -c pipeline/backtest_config.yaml
