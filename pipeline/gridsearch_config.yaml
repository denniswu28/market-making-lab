# Optional user-supplied real-data research template.
base_root: "./out/user_supplied"
exchange: "binance-futures"
symbols: ["SYNTHUSDT"]
date_from: 20250101
date_to: 20250101
initial_snapshot: null
binary: "target/release/examples/gridtrading_backtest_args"
num_proc: 1
fees:
  maker: -0.00005
  taker: 0.0007
queue_power: 3.0
defaults:
  tick_size: 1.0
  lot_size: 1.0
tickers_json: "pipeline/tickers.json"
elapse_ns: 1000000000
record_every: 1
rust_log: "error"
grid:
  relative_half_spread: 0.0005
  relative_grid_interval: 0.0005
  grid_num: 5
  min_grid_step_override: null
  skew_override: null
  order_value_usd: 100
  max_position_in_grids: 5
algo:
  name: "obi-static-alpha"
  params:
    look_depth_pct: 0.01
    normalize: true
    alpha_scale: 50.0
transform:
  kind: "zscore"
  window: 60
  ema_alpha: 0.1
out_path: "./out/gridsearch"
gridsearch:
  rel_half_spread: [0.0005]
  grid_num: [5]
  relative_grid_interval: "same"
  skew_mode: "rel_over_n"
  max_position_mode: "equal_to_grid_num"
  algo_params:
    alpha_scale: [25.0, 50.0]
  skip_existing: false
  random_seed: 7
  train_dates: [20250101, 20250101]
  validation_dates: [20250102, 20250102]
  test_dates: [20250103, 20250103]
  # TODO(Dennis): replace after reviewing gridsearch_validation_summary.csv.
  # This must be exactly one candidate_id from that file before test data can run.
  locked_candidate: ["TODO(Dennis)"]
delete_inputs_after: false
