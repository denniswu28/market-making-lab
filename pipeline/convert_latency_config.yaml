# Optional user-supplied real-data path.
feeds_output_root: "./out/user_supplied/data"
latency_output_root: "./out/user_supplied/latency"
tmp_root: "./out/user_supplied/.tmp"
keep_temps: false
exchange: "binance-futures"
symbols: ["SYNTHUSDT"]
date_from: "2025-01-01"
date_to: "2025-01-01"
snapshot_mode: "auto"
sod_date: "2025-01-01"
use_quotes: false
num_proc: 1
buffer_size: 200000000
ss_buffer_size: 2000000
base_latency: 0.0
output_format: "npz"
delete_inputs_after: false
skip_existing_feed: false
bucket_every: "1000000000i"
mul_entry: 4
offset_entry: 0
mul_resp: 3
offset_resp: 0
include_symbol_dir: true
latency_filename_template: "latency_{date}.npz"
overwrite_latency: true
